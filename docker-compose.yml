version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aaa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aaa_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aaa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # GenAI Core (Python/FastAPI)
  genai-core:
    build:
      context: ./aaa-platform/genai-core
      dockerfile: Dockerfile
    container_name: aaa-genai-core
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Control Plane (Next.js)
  control-plane:
    build:
      context: ./aaa-platform/control-plane
      dockerfile: Dockerfile
    container_name: aaa-control-plane
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GENAI_CORE_URL=http://genai-core:8000
      - NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-https://apexautomation.ai}
      - SENTRY_DSN=${SENTRY_DSN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      genai-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Nginx Reverse Proxy (SSL/TLS termination)
  nginx:
    image: nginx:alpine
    container_name: aaa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - control-plane
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
